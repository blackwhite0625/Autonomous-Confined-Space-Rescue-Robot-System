<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>搜救機器人系統架構圖</title>
<style>body{background:#fff;margin:0;padding:20px;font-family:'Microsoft JhengHei','Segoe UI',sans-serif;}</style>
</head>
<body>
<svg viewBox="0 0 980 700" xmlns="http://www.w3.org/2000/svg" style="max-width:960px;margin:0 auto;display:block;">
<defs>
  <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#444" stroke-width="1"/>
  </marker>
  <marker id="ad" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#aaa" stroke-width="1"/>
  </marker>
</defs>

<!-- 標題 -->
<text x="480" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#111">具生命跡象偵測之搜救機器人系統 — 系統架構圖</text>

<!-- ════════════════════════════════════════ -->
<!-- 操作員 -->
<!-- ════════════════════════════════════════ -->
<rect x="40" y="55" width="95" height="55" rx="5" fill="#fff" stroke="#222" stroke-width="1.5"/>
<text x="88" y="78" text-anchor="middle" font-size="10" font-weight="bold" fill="#222">操作員</text>
<text x="88" y="98" text-anchor="middle" font-size="8" fill="#888">手機 / 電腦</text>

<!-- Web 控制台 -->
<rect x="210" y="50" width="135" height="68" rx="6" fill="#f5f5f5" stroke="#222" stroke-width="1.5"/>
<text x="278" y="70" text-anchor="middle" font-size="10" font-weight="bold" fill="#222">Web 控制台</text>
<line x1="220" y1="78" x2="335" y2="78" stroke="#ddd" stroke-width="0.5"/>
<text x="278" y="100" text-anchor="middle" font-size="7.5" fill="#666">影像串流 / 搖桿 / 狀態面板</text>
<text x="278" y="112" text-anchor="middle" font-size="7.5" fill="#666">夜視切換 / 熱區地圖</text>

<!-- 操作員 → Web -->
<line x1="135" y1="82" x2="208" y2="82" stroke="#444" stroke-width="1.2" marker-end="url(#a)"/>

<!-- ════════════════════════════════════════ -->
<!-- RPi 大框 -->
<!-- ════════════════════════════════════════ -->
<rect x="170" y="145" width="770" height="460" rx="12" fill="none" stroke="#222" stroke-width="1.8" stroke-dasharray="6,3"/>
<text x="186" y="163" font-size="10" font-weight="bold" fill="#222">Raspberry Pi 5 (Flask + 4 背景執行緒)</text>

<!-- Web → RPi -->
<line x1="278" y1="118" x2="278" y2="143" stroke="#444" stroke-width="1.2" marker-end="url(#a)"/>

<!-- ════════════════════════════════════════ -->
<!-- 硬體設備 (左側) -->
<!-- ════════════════════════════════════════ -->
<rect x="10" y="180" width="130" height="450" rx="8" fill="#fafafa" stroke="#999" stroke-width="1" stroke-dasharray="4,2"/>
<text x="75" y="198" text-anchor="middle" font-size="9" font-weight="bold" fill="#555">硬體設備</text>

<!-- 攝影機 -->
<rect x="20" y="210" width="110" height="42" rx="4" fill="#fff" stroke="#333" stroke-width="1.2"/>
<text x="75" y="228" text-anchor="middle" font-size="9" font-weight="bold" fill="#222">USB 攝影機</text>
<text x="75" y="246" text-anchor="middle" font-size="7" fill="#999">640x480 @30fps</text>

<!-- 麥克風 -->
<rect x="20" y="262" width="110" height="42" rx="4" fill="#fff" stroke="#333" stroke-width="1.2"/>
<text x="75" y="280" text-anchor="middle" font-size="9" font-weight="bold" fill="#222">USB 麥克風</text>
<text x="75" y="298" text-anchor="middle" font-size="7" fill="#999">48kHz</text>

<!-- 超聲波 -->
<rect x="20" y="314" width="110" height="42" rx="4" fill="#fff" stroke="#333" stroke-width="1.2"/>
<text x="75" y="330" text-anchor="middle" font-size="9" font-weight="bold" fill="#222">HC-SR04 超聲波</text>
<text x="75" y="342" text-anchor="middle" font-size="7" fill="#999">測距 + 安全煞車</text>
<text x="75" y="352" text-anchor="middle" font-size="7" fill="#999">(&lt;20cm 自動停車)</text>

<!-- Hailo NPU -->
<rect x="20" y="366" width="110" height="42" rx="4" fill="#fff" stroke="#333" stroke-width="1.2"/>
<text x="75" y="384" text-anchor="middle" font-size="9" font-weight="bold" fill="#222">Hailo-8 NPU</text>
<text x="75" y="402" text-anchor="middle" font-size="7" fill="#999">AI 加速 (PCIe)</text>

<!-- 馬達 -->
<rect x="20" y="420" width="110" height="42" rx="4" fill="#fff" stroke="#333" stroke-width="1.2"/>
<text x="75" y="438" text-anchor="middle" font-size="9" font-weight="bold" fill="#222">麥克納姆輪 x4</text>
<text x="75" y="456" text-anchor="middle" font-size="7" fill="#999">L298N x2 驅動</text>

<!-- 舵機 -->
<rect x="20" y="472" width="110" height="42" rx="4" fill="#fff" stroke="#333" stroke-width="1.2"/>
<text x="75" y="490" text-anchor="middle" font-size="9" font-weight="bold" fill="#222">雲台舵機</text>
<text x="75" y="508" text-anchor="middle" font-size="7" fill="#999">Pan / Tilt</text>

<!-- 喇叭 -->
<rect x="20" y="524" width="110" height="42" rx="4" fill="#fff" stroke="#333" stroke-width="1.2"/>
<text x="75" y="542" text-anchor="middle" font-size="9" font-weight="bold" fill="#222">USB 喇叭</text>
<text x="75" y="560" text-anchor="middle" font-size="7" fill="#999">警報 / TTS 輸出</text>

<!-- ════════════════════════════════════════ -->
<!-- 硬體 → AI 連線 (輸入) -->
<!-- ════════════════════════════════════════ -->
<!-- 攝影機 → 視覺AI -->
<line x1="130" y1="231" x2="190" y2="231" stroke="#444" stroke-width="1.1" marker-end="url(#a)"/>
<!-- 麥克風 → 音訊偵測 -->
<line x1="130" y1="283" x2="155" y2="283" stroke="#444" stroke-width="1.1"/>
<line x1="155" y1="283" x2="155" y2="340" stroke="#444" stroke-width="1.1"/>
<line x1="155" y1="340" x2="190" y2="340" stroke="#444" stroke-width="1.1" marker-end="url(#a)"/>
<!-- Hailo → 視覺AI -->
<line x1="130" y1="387" x2="160" y2="387" stroke="#444" stroke-width="1.1"/>
<line x1="160" y1="387" x2="160" y2="260" stroke="#444" stroke-width="1.1"/>
<line x1="160" y1="260" x2="190" y2="260" stroke="#444" stroke-width="1.1" marker-end="url(#a)"/>

<!-- ════════════════════════════════════════ -->
<!-- AI 感知層 -->
<!-- ════════════════════════════════════════ -->
<!-- 視覺偵測 -->
<rect x="192" y="195" width="195" height="85" rx="6" fill="#f8f8f8" stroke="#333" stroke-width="1.5"/>
<text x="290" y="214" text-anchor="middle" font-size="10" font-weight="bold" fill="#222">AI 視覺偵測</text>
<line x1="200" y1="222" x2="379" y2="222" stroke="#ddd" stroke-width="0.5"/>
<text x="290" y="246" text-anchor="middle" font-size="7.5" fill="#555">YOLOv8 人體 + 姿態偵測</text>
<text x="290" y="258" text-anchor="middle" font-size="7.5" fill="#555">倒地 / 蜷縮 / 揮手辨識</text>
<text x="290" y="270" text-anchor="middle" font-size="7.5" fill="#555">多人追蹤 + 物件偵測</text>

<!-- 音訊偵測 -->
<rect x="192" y="300" width="195" height="65" rx="6" fill="#f8f8f8" stroke="#333" stroke-width="1.5"/>
<text x="290" y="319" text-anchor="middle" font-size="10" font-weight="bold" fill="#222">音訊偵測</text>
<line x1="200" y1="327" x2="379" y2="327" stroke="#ddd" stroke-width="0.5"/>
<text x="290" y="351" text-anchor="middle" font-size="7.5" fill="#555">VAD / 呼救聲 / 敲擊聲</text>

<!-- HRI 互動 -->
<rect x="192" y="385" width="195" height="65" rx="6" fill="#f8f8f8" stroke="#333" stroke-width="1.5"/>
<text x="290" y="404" text-anchor="middle" font-size="10" font-weight="bold" fill="#222">HRI 人機互動</text>
<line x1="200" y1="412" x2="379" y2="412" stroke="#ddd" stroke-width="0.5"/>
<text x="290" y="436" text-anchor="middle" font-size="7.5" fill="#555">TTS 問詢 / STT 辨識</text>


<!-- ════════════════════════════════════════ -->
<!-- AI → 融合 連線 -->
<!-- ════════════════════════════════════════ -->
<line x1="387" y1="238" x2="440" y2="275" stroke="#444" stroke-width="1.1" marker-end="url(#a)"/>
<line x1="387" y1="333" x2="440" y2="300" stroke="#444" stroke-width="1.1" marker-end="url(#a)"/>
<line x1="387" y1="418" x2="440" y2="320" stroke="#444" stroke-width="1.1" marker-end="url(#a)"/>

<!-- ════════════════════════════════════════ -->
<!-- 融合模組 -->
<!-- ════════════════════════════════════════ -->
<rect x="442" y="245" width="215" height="100" rx="8" fill="#fff" stroke="#222" stroke-width="2"/>
<text x="550" y="265" text-anchor="middle" font-size="11" font-weight="bold" fill="#222">多模態融合</text>
<line x1="452" y1="273" x2="647" y2="273" stroke="#ddd" stroke-width="0.5"/>
<text x="550" y="290" text-anchor="middle" font-size="7.5" font-family="Courier New" fill="#444">VictimScore (受困者風險分數) =</text>
<text x="550" y="303" text-anchor="middle" font-size="7" font-family="Courier New" fill="#444">0.45*Person(人體) + 0.20*Pose(姿態)</text>
<text x="550" y="314" text-anchor="middle" font-size="7" font-family="Courier New" fill="#444">+ 0.20*Audio(音訊) + 0.10*Motion(互動)</text>
<text x="550" y="325" text-anchor="middle" font-size="7" font-family="Courier New" fill="#444">+ 0.05*Distance(距離)</text>
<text x="550" y="340" text-anchor="middle" font-size="8" fill="#888">LOW(低) / SUSPECT(疑似) / HIGH(高危)</text>

<!-- 融合 → 狀態機 -->
<line x1="657" y1="295" x2="690" y2="295" stroke="#444" stroke-width="1.2" marker-end="url(#a)"/>

<!-- ════════════════════════════════════════ -->
<!-- 狀態機 -->
<!-- ════════════════════════════════════════ -->
<rect x="692" y="185" width="240" height="235" rx="8" fill="#f5f5f5" stroke="#222" stroke-width="2"/>
<text x="812" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="#222">任務狀態機</text>
<line x1="702" y1="213" x2="922" y2="213" stroke="#ccc" stroke-width="0.5"/>

<!-- 狀態方塊 -->
<rect x="720" y="232" width="185" height="20" rx="3" fill="#fff" stroke="#555" stroke-width="1"/>
<text x="812" y="246" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#333">STANDBY (待命)</text>
<text x="812" y="260" text-anchor="middle" font-size="9" fill="#bbb">|</text>
<rect x="720" y="264" width="185" height="20" rx="3" fill="#fff" stroke="#555" stroke-width="1"/>
<text x="812" y="278" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#333">SEARCH (搜索)</text>
<text x="812" y="292" text-anchor="middle" font-size="9" fill="#bbb">|</text>
<rect x="720" y="296" width="185" height="20" rx="3" fill="#fff" stroke="#555" stroke-width="1"/>
<text x="812" y="310" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#333">ANOMALY (異常)</text>
<text x="812" y="324" text-anchor="middle" font-size="9" fill="#bbb">|</text>
<rect x="720" y="328" width="185" height="20" rx="3" fill="#fff" stroke="#555" stroke-width="1"/>
<text x="812" y="342" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#333">LOCK_ON (鎖定) / INQUIRY (問詢)</text>
<text x="812" y="356" text-anchor="middle" font-size="9" fill="#bbb">|</text>
<rect x="720" y="360" width="185" height="20" rx="3" fill="#fff" stroke="#555" stroke-width="1"/>
<text x="812" y="374" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#333">CONFIRM (確認)</text>
<text x="812" y="388" text-anchor="middle" font-size="9" fill="#bbb">|</text>
<rect x="720" y="392" width="185" height="20" rx="3" fill="#fff" stroke="#333" stroke-width="1.5"/>
<text x="812" y="406" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#222">REPORT (通報)</text>

<line x1="812" y1="468" x2="812" y2="530" stroke="#444" stroke-width="1.1" marker-end="url(#a)"/>
