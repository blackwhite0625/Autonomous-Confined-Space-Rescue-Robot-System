<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8"><title>圖(二)</title>
<style>body{background:#fff;margin:0;padding:20px;font-family:'Microsoft JhengHei',sans-serif;}</style></head>
<body>
<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" style="max-width:680px;margin:0 auto;display:block;">
<defs>
  <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#333" stroke-width="1"/></marker>
</defs>

<text x="350" y="22" text-anchor="middle" font-size="13" font-weight="bold">圖(二) Hailo-8 AI Kit 與 Raspberry Pi 5B 硬體架構圖</text>

<rect x="200" y="50" width="300" height="80" rx="8" fill="#f5f5f5" stroke="#222" stroke-width="1.8"/>
<text x="350" y="75" text-anchor="middle" font-size="12" font-weight="bold">Raspberry Pi 5B (8GB)</text>
<text x="350" y="95" text-anchor="middle" font-size="8" fill="#666">ARM Cortex-A76 / Debian Bookworm / Python 3.13</text>
<text x="350" y="110" text-anchor="middle" font-size="8" fill="#666">Flask + 4 背景執行緒 + GPIO 控制</text>

<rect x="530" y="55" width="140" height="65" rx="6" fill="#eee" stroke="#222" stroke-width="1.5"/>

<text x="600" y="93" text-anchor="middle" font-size="7.5" fill="#666">26 TOPS / 2.5W</text>
<text x="600" y="106" text-anchor="middle" font-size="7.5" fill="#666">YOLOv8s-pose HEF</text>
<line x1="500" y1="87" x2="528" y2="87" stroke="#333" stroke-width="1.2" marker-end="url(#a)"/>

<line x1="160" y1="187" x2="260" y2="120" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

<rect x="40" y="225" width="120" height="45" rx="5" fill="#f8f8f8" stroke="#333" stroke-width="1.2"/>

<rect x="40" y="285" width="120" height="45" rx="5" fill="#f8f8f8" stroke="#333" stroke-width="1.2"/>

<rect x="250" y="250" width="200" height="55" rx="5" fill="#f8f8f8" stroke="#333" stroke-width="1.2"/>

<rect x="250" y="325" width="200" height="55" rx="5" fill="#f8f8f8" stroke="#333" stroke-width="1.2"/>

<line x1="590" y1="220" x2="590" y2="238" stroke="#333" stroke-width="1" marker-end="url(#a)"/>

<rect x="520" y="330" width="140" height="45" rx="5" fill="#f8f8f8" stroke="#333" stroke-width="1.2"/>

<text x="590" y="365" text-anchor="middle" font-size="7" fill="#666">雙槽電池座</text>
