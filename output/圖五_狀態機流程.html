<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8"><title>圖(二) 7階段搜救流程圖</title>
<style>body{background:#fff;margin:0;padding:30px;font-family:'Microsoft JhengHei',sans-serif;}</style></head>
<body>
<svg viewBox="0 0 960 520" xmlns="http://www.w3.org/2000/svg" style="max-width:940px;margin:0 auto;display:block;">
<defs>
  <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="none" stroke="#333" stroke-width="1.2"/></marker>
</defs>

<text x="480" y="28" text-anchor="middle" font-size="16" font-weight="bold">圖(二) 7 階段任務狀態機搜救流程圖</text>

<!-- ====== 7 個階段方塊 (120x90, 大間距) ====== -->

<!-- STANDBY -->
<rect x="10" y="60" width="110" height="85" rx="8" fill="#e8e8e8" stroke="#222" stroke-width="1.5"/>
<text x="65" y="95" text-anchor="middle" font-size="13" font-weight="bold">STANDBY</text>
<text x="65" y="125" text-anchor="middle" font-size="11" fill="#555">待命</text>

<!-- SEARCH -->
<rect x="155" y="60" width="110" height="85" rx="8" fill="#f0f0f0" stroke="#222" stroke-width="1.5"/>
<text x="210" y="95" text-anchor="middle" font-size="13" font-weight="bold">SEARCH</text>
<text x="210" y="125" text-anchor="middle" font-size="11" fill="#555">自主巡邏</text>

<!-- ANOMALY -->
<rect x="300" y="60" width="110" height="85" rx="8" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
<text x="355" y="95" text-anchor="middle" font-size="13" font-weight="bold">ANOMALY</text>
<text x="355" y="125" text-anchor="middle" font-size="11" fill="#555">疑似受困者</text>

<!-- LOCK_ON -->
<rect x="445" y="60" width="110" height="85" rx="8" fill="#fde8e8" stroke="#c0392b" stroke-width="1.5"/>
<text x="500" y="95" text-anchor="middle" font-size="13" font-weight="bold">LOCK_ON</text>
<text x="500" y="125" text-anchor="middle" font-size="11" fill="#555">鎖定靠近</text>

<!-- INQUIRY -->
<rect x="590" y="60" width="110" height="85" rx="8" fill="#f3e5f5" stroke="#8e44ad" stroke-width="1.5"/>
<text x="645" y="95" text-anchor="middle" font-size="13" font-weight="bold">INQUIRY</text>
<text x="645" y="125" text-anchor="middle" font-size="11" fill="#555">語音問詢</text>

<!-- CONFIRM -->
<rect x="735" y="60" width="110" height="85" rx="8" fill="#e3f2fd" stroke="#2980b9" stroke-width="1.5"/>
<text x="790" y="95" text-anchor="middle" font-size="13" font-weight="bold">CONFIRM</text>
<text x="790" y="125" text-anchor="middle" font-size="11" fill="#555">確認救援</text>

<!-- REPORT (下方獨立) -->
<rect x="735" y="205" width="120" height="85" rx="8" fill="#fde8e8" stroke="#c0392b" stroke-width="2"/>
<text x="795" y="240" text-anchor="middle" font-size="14" font-weight="bold">REPORT</text>
<text x="795" y="270" text-anchor="middle" font-size="11" fill="#555">通報 + 警報</text>

<!-- ====== 箭頭 ====== -->
<line x1="120" y1="102" x2="153" y2="102" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
<line x1="265" y1="102" x2="298" y2="102" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
<line x1="410" y1="102" x2="443" y2="102" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
<line x1="555" y1="102" x2="588" y2="102" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
<line x1="700" y1="102" x2="733" y2="102" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>
<line x1="795" y1="145" x2="795" y2="203" stroke="#333" stroke-width="1.5" marker-end="url(#a)"/>

<!-- ====== 轉換條件標籤 (方塊上方, 不重疊) ====== -->
<text x="137" y="56" text-anchor="middle" font-size="8" fill="#888">啟動</text>
<text x="282" y="56" text-anchor="middle" font-size="8" fill="#888">Score>=0.30</text>
<text x="428" y="56" text-anchor="middle" font-size="8" fill="#888">Score>=0.60</text>
<text x="572" y="56" text-anchor="middle" font-size="8" fill="#888">距離<=30cm</text>
<text x="717" y="56" text-anchor="middle" font-size="8" fill="#888">回應分析</text>
<text x="820" y="180" font-size="8" fill="#888">確認</text>

<!-- 回傳: REPORT → SEARCH (虛線) -->
<path d="M 735,247 L 120,247 L 120,170 L 155,145" fill="none" stroke="#999" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#a)"/>
<text x="350" y="242" text-anchor="middle" font-size="9" fill="#999">冷卻 30 秒後繼續搜索</text>

<!-- 回傳: ANOMALY → SEARCH (Score降回) -->
<path d="M 355,145 Q 355,180 280,180 L 210,180 L 210,145" fill="none" stroke="#999" stroke-width="0.8" stroke-dasharray="3,2" marker-end="url(#a)"/>
<text x="283" y="195" text-anchor="middle" font-size="8" fill="#999">Score 降回</text>

<!-- ====== 下方詳細說明 (每行間距 20px) ====== -->

<rect x="10" y="310" width="220" height="140" rx="6" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
<text x="120" y="338" text-anchor="middle" font-size="11" font-weight="bold">SEARCH 階段動作</text>
<text x="25" y="362" font-size="10" fill="#555">- 模式 D：靜止舵機掃描</text>
<text x="25" y="382" font-size="10" fill="#555">- 模式 E：走停掃描巡邏</text>
<text x="25" y="402" font-size="10" fill="#555">- 模式 F：超聲波旋轉掃描</text>
<text x="25" y="422" font-size="10" fill="#555">- AI 偵測持續運行</text>
<text x="25" y="442" font-size="10" fill="#555">- Score >= 0.30 暫停掃描</text>

<rect x="250" y="310" width="220" height="140" rx="6" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
<text x="360" y="338" text-anchor="middle" font-size="11" font-weight="bold">LOCK_ON 階段動作</text>
<text x="265" y="362" font-size="10" fill="#555">- 舵機鎖定目標方向</text>
<text x="265" y="382" font-size="10" fill="#555">- 車體轉向對準目標</text>
<text x="265" y="402" font-size="10" fill="#555">- 緩慢前進靠近</text>
<text x="265" y="422" font-size="10" fill="#555">- 距離 <= 25cm 停車</text>
<text x="265" y="442" font-size="10" fill="#555">- 最長 15 秒逾時</text>

<rect x="490" y="310" width="220" height="140" rx="6" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
<text x="600" y="338" text-anchor="middle" font-size="11" font-weight="bold">INQUIRY 階段動作</text>
<text x="505" y="362" font-size="10" fill="#555">- TTS：「有人被困嗎?」</text>
<text x="505" y="382" font-size="10" fill="#555">- 收音 3 秒分析回應</text>
<text x="505" y="402" font-size="10" fill="#555">- TTS：「請揮手或敲擊」</text>
<text x="505" y="422" font-size="10" fill="#555">- 收音 3 秒分析動作</text>
<text x="505" y="442" font-size="10" fill="#555">- 語音 +0.4 / 敲擊 +0.3</text>

<rect x="730" y="310" width="220" height="140" rx="6" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
<text x="840" y="338" text-anchor="middle" font-size="11" font-weight="bold">REPORT 階段動作</text>
<text x="745" y="362" font-size="10" fill="#555">- Telegram 推播照片+座標</text>
<text x="745" y="382" font-size="10" fill="#555">- TTS 緊急語音廣播</text>
<text x="745" y="402" font-size="10" fill="#555">- 播放警報音 x3</text>
<text x="745" y="422" font-size="10" fill="#555">- 事件截圖 + JSON 記錄</text>
<text x="745" y="442" font-size="10" fill="#555">- 冷卻 30 秒後回 SEARCH</text>

</svg>
</body></html>
