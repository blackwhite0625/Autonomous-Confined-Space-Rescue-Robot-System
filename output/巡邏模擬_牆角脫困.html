<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8"><title>巡邏模擬：牆角脫困</title>
<style>body{background:#fff;margin:0;padding:20px;font-family:'Microsoft JhengHei',sans-serif;}</style></head>
<body>
<svg viewBox="0 0 900 450" xmlns="http://www.w3.org/2000/svg" style="max-width:880px;margin:0 auto;display:block;">

<text x="450" y="24" text-anchor="middle" font-size="15" font-weight="bold">巡邏模擬：90° 牆角脫困 — 舊 3 方向 vs 新 6 方向掃描</text>

<!-- ====== 左半：舊算法（卡死）====== -->
<text x="220" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">舊算法（3 方向掃描）→ 卡死</text>

<!-- 牆角 -->
<line x1="50" y1="80" x2="50" y2="350" stroke="#333" stroke-width="3"/>
<line x1="50" y1="350" x2="380" y2="350" stroke="#333" stroke-width="3"/>
<text x="30" y="220" font-size="9" fill="#888" transform="rotate(-90,30,220)">牆壁</text>
<text x="210" y="370" font-size="9" fill="#888">牆壁</text>

<!-- 車子 -->
<rect x="90" y="290" width="30" height="40" rx="4" fill="#2ecc71" stroke="#222" stroke-width="1.5"/>
<text x="105" y="315" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">車</text>

<!-- 3 方向掃描線（全堵）-->
<line x1="105" y1="290" x2="105" y2="130" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3"/>
<text x="112" y="210" font-size="8" fill="#e74c3c">0°: 15cm</text>

<line x1="105" y1="290" x2="55" y2="170" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3"/>
<text x="58" y="235" font-size="8" fill="#e74c3c">-45°: 20cm</text>

<line x1="105" y1="290" x2="200" y2="345" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3"/>
<text x="160" y="330" font-size="8" fill="#e74c3c">+45°: 21cm</text>

<!-- 全堵標記 -->
<rect x="140" y="250" width="200" height="25" rx="4" fill="#fde8e8" stroke="#c0392b" stroke-width="1"/>
<text x="240" y="267" text-anchor="middle" font-size="9" fill="#c0392b" font-weight="bold">三方向全 &lt; 35cm → 全堵！猜方向 → 卡死</text>

<!-- 重複箭頭（卡死循環）-->
<path d="M 120,290 Q 180,250 180,300 Q 180,340 120,330" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="3,2"/>
<text x="190" y="290" font-size="7" fill="#999">無限循環</text>

<!-- 看不到的出口 -->
<line x1="105" y1="290" x2="350" y2="150" stroke="#27ae60" stroke-width="2" stroke-dasharray="6,3" opacity="0.4"/>
<text x="250" y="190" font-size="9" fill="#27ae60" font-weight="bold">出口在 135°！但掃不到</text>

<!-- ====== 右半：新算法（成功脫困）====== -->
<text x="670" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">新算法（6 方向掃描）→ 一次脫困</text>

<!-- 牆角 -->
<line x1="500" y1="80" x2="500" y2="350" stroke="#333" stroke-width="3"/>
<line x1="500" y1="350" x2="830" y2="350" stroke="#333" stroke-width="3"/>

<!-- 車子 -->
<rect x="540" y="290" width="30" height="40" rx="4" fill="#2ecc71" stroke="#222" stroke-width="1.5"/>
<text x="555" y="315" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">車</text>

<!-- 6 方向掃描線 -->
<!-- 0° 堵 -->
<line x1="555" y1="290" x2="555" y2="130" stroke="#e74c3c" stroke-width="1.2" stroke-dasharray="3,2"/>
<circle cx="555" cy="135" r="3" fill="#e74c3c"/>
<text x="562" y="170" font-size="7" fill="#e74c3c">0°:15</text>

<!-- 60° 堵 -->
<line x1="555" y1="290" x2="640" y2="340" stroke="#e74c3c" stroke-width="1.2" stroke-dasharray="3,2"/>
<circle cx="637" cy="337" r="3" fill="#e74c3c"/>
<text x="625" y="330" font-size="7" fill="#e74c3c">60°:22</text>

<!-- -60° 堵 -->
<line x1="555" y1="290" x2="510" y2="190" stroke="#e74c3c" stroke-width="1.2" stroke-dasharray="3,2"/>
<circle cx="512" cy="195" r="3" fill="#e74c3c"/>
<text x="510" y="220" font-size="7" fill="#e74c3c">-60°:18</text>

<!-- 120° 通！ -->
<line x1="555" y1="290" x2="750" y2="220" stroke="#27ae60" stroke-width="2"/>
<circle cx="747" cy="222" r="4" fill="#27ae60"/>
<text x="700" y="210" font-size="8" fill="#27ae60" font-weight="bold">120°:80cm</text>

<!-- 180° 通！ -->
<line x1="555" y1="290" x2="780" y2="130" stroke="#27ae60" stroke-width="2"/>
<circle cx="778" cy="133" r="4" fill="#27ae60"/>
<text x="740" y="120" font-size="8" fill="#27ae60" font-weight="bold">180°:150cm</text>

<!-- -120° 通！ -->
<line x1="555" y1="290" x2="690" y2="130" stroke="#27ae60" stroke-width="2"/>
<circle cx="688" cy="133" r="4" fill="#27ae60"/>
<text x="650" y="120" font-size="8" fill="#27ae60" font-weight="bold">-120°:120cm</text>

<!-- 選擇 180° -->
<path d="M 555,330 C 600,400 750,350 780,140" fill="none" stroke="#27ae60" stroke-width="2.5" marker-end="url(#ga)"/>
<text x="700" y="310" font-size="10" fill="#27ae60" font-weight="bold">選 180°（最遠）→ 掉頭離開！</text>

<defs>
  <marker id="ga" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#27ae60"/></marker>
</defs>

<!-- 結果對比 -->
<rect x="50" y="390" width="380" height="40" rx="6" fill="#fde8e8" stroke="#c0392b" stroke-width="1"/>
<text x="240" y="415" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold">結果：卡死 30+ 秒，反覆撞牆</text>

<rect x="500" y="390" width="380" height="40" rx="6" fill="#e8f5e9" stroke="#27ae60" stroke-width="1"/>
<text x="690" y="415" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">結果：10 秒掃描 → 一次脫困</text>

</svg>
</body></html>
